port: 8080

probes:
  # Minimal — only name and url required, everything else is optional
  - name: example
    url: "https://example.com"

  # With some options
  - name: httpbin
    url: "https://httpbin.org/get"
    interval_seconds: 30
    timeout_ms: 5000
    retries: 2
    expected_status: [200, 299]
    circuit_breaker:
      failure_threshold: 5
      cooldown_seconds: 60

  # Redirect following + custom headers
  - name: httpbin-redirect
    url: "https://httpbin.org/redirect/2"
    interval_seconds: 120
    follow_redirects: 5
    headers:
      - ["X-Custom-Header", "sentinel-probe"]
