port: 8080

# Uncomment to enable alerting channels:
# alerting:
#   slack:
#     webhook_url: "https://hooks.slack.com/services/T.../B.../xxx"
#   resend:
#     api_key: "re_xxx"
#     from: "sentinel@example.com"
#     to: ["oncall@example.com"]
#   prometheus:
#     pushgateway_url: "http://localhost:9091"
#     job: "sentinel"

probes:
  - name: example
    url: "https://example.com"

  - name: httpbin
    url: "https://httpbin.org/get"
    interval_seconds: 30
    timeout_ms: 5000
    retries: 2
    expected_status: [200, 299]
    alert_after: 3
    alert_reminder: 3600
    circuit_breaker:
      failure_threshold: 5
      cooldown_seconds: 60

  - name: httpbin-redirect
    url: "https://httpbin.org/redirect/2"
    interval_seconds: 120
    follow_redirects: 5
    headers:
      - ["X-Custom-Header", "sentinel-probe"]
